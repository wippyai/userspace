version: "1.0"
namespace: userspace.onboard

entries:
  # userspace.onboard:registry
  - name: registry
    kind: library.lua
    meta:
      comment: Registry for managing onboarding steps
    source: file://registry.lua
    modules:
      - registry
      - security

  # Requirements
  - name: web_host_origin_env
    kind: ns.requirement
    meta:
    description: "Environment variable that defines the public web host origin URL"
    default: "userspace.onboard.env:web_host_origin"
    targets:
      - entry: userspace.onboard.views:env_mapping
        path: ".mappings.web_host_origin"
