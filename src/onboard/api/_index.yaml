version: "1.0"
namespace: userspace.onboard.api

entries:
  # userspace.onboard.api:api_error
  - name: api_error
    kind: library.lua
    meta:
      comment: Helper for safe API error responses without leaking internals
    source: file://api_error.lua
    modules:
      - logger

  # userspace.onboard.api:list_steps
  - name: list_steps
    kind: function.lua
    meta:
      comment: Returns list of onboarding steps with metadata
      router: app:api
    source: file://list_steps.lua
    modules:
      - http
      - json
      - security
    imports:
      onboard_registry: userspace.onboard:registry
      api_error: userspace.onboard.api:api_error
    method: handler

  # userspace.onboard.api:list_steps.endpoint
  - name: list_steps.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for listing onboarding steps
      router: app:api
    method: GET
    func: list_steps
    path: /onboard/steps

  # userspace.onboard.api:render_step
  - name: render_step
    kind: function.lua
    meta:
      comment: Renders an onboarding step
      router: app:api
    source: file://render_step.lua
    modules:
      - http
      - json
      - security
      - templates
      - env
    imports:
      onboard_registry: userspace.onboard:registry
      api_error: userspace.onboard.api:api_error
    method: handler

  # userspace.onboard.api:render_step.endpoint
  - name: render_step.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for rendering onboarding step
      router: app:api
    method: GET
    func: render_step
    path: /onboard/step/{step_name}
