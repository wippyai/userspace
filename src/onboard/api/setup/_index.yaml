version: "1.0"
namespace: userspace.onboard.api.setup

entries:
  # userspace.onboard.api.setup:openrouter
  - name: openrouter
    kind: function.lua
    meta:
      comment: Sets up OpenRouter API connection and validates key
      router: app:api
    source: file://openrouter.lua
    modules:
      - http
      - json
      - security
      - env
      - http_client
    imports:
      api_error: userspace.onboard.api:api_error
    method: handler

  # userspace.onboard.api.setup:openrouter.endpoint
  - name: openrouter.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for OpenRouter API key setup and validation
      router: app:api
    method: POST
    func: openrouter
    path: /onboard/setup/openrouter

  # userspace.onboard.api.setup:embeddings
  - name: embeddings
    kind: function.lua
    meta:
      comment: Sets up OpenAI API for embeddings and validates key
      router: app:api
    source: file://embeddings.lua
    modules:
      - http
      - json
      - security
      - env
      - http_client
    imports:
      api_error: userspace.onboard.api:api_error
    method: handler

  # userspace.onboard.api.setup:embeddings.endpoint
  - name: embeddings.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for OpenAI embeddings setup and validation
      router: app:api
    method: POST
    func: embeddings
    path: /onboard/setup/embeddings

  # userspace.onboard.api.setup:capabilities
  - name: capabilities
    kind: function.lua
    meta:
      comment: Verifies and configures additional capabilities like Google search
      router: app:api
    source: file://capabilities.lua
    modules:
      - http
      - json
      - security
      - env
      - http_client
    imports:
      api_error: userspace.onboard.api:api_error
    method: handler

  # userspace.onboard.api.setup:capabilities.endpoint
  - name: capabilities.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for verifying additional capabilities setup
      router: app:api
    method: POST
    func: capabilities
    path: /onboard/setup/capabilities
