version: "1.0"
namespace: userspace.onboard.api.setup

entries:
  # userspace.onboard.api.setup:capabilities
  - name: capabilities
    kind: function.lua
    meta:
      comment: Verifies and configures additional capabilities like Google search
      depends_on:
        - ns:app
      router: app:api
    source: file://capabilities.lua
    modules:
      - http
      - json
      - security
      - env
      - http_client
    method: handler
    
  # userspace.onboard.api.setup:capabilities.endpoint
  - name: capabilities.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for verifying additional capabilities setup
      depends_on:
        - ns:app
      router: app:api
    method: POST
    func: capabilities
    path: /onboard/setup/capabilities
    
  # userspace.onboard.api.setup:providers
  - name: providers
    kind: function.lua
    meta:
      comment: Sets up AI providers with OpenRouter (required) and OpenAI (optional)
      depends_on:
        - ns:app
      router: app:api
    source: file://providers.lua
    modules:
      - http
      - json
      - security
      - env
      - http_client
    method: handler
    
  # userspace.onboard.api.setup:providers.endpoint
  - name: providers.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint for AI provider setup with real-time status via SSE
      depends_on:
        - ns:app
      router: app:api
    method: POST
    func: providers
    path: /onboard/setup/providers
    