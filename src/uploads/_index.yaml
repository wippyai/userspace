version: "1.0"
namespace: userspace.uploads

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Userspace Uploads
      description: File upload handling with content processing

  # Requirements
  - name: database_resource
    kind: ns.requirement
    meta:
      description: Database resource for uploads storage
    default: app:db
    targets:
      - entry: userspace.uploads.env:database_resource
        path: .default
      - entry: userspace.uploads.migrations:01_create_uploads_table
        path: .meta.target_db
      - entry: userspace.uploads.migrations:02_add_type_id_to_uploads
        path: .meta.target_db
      - entry: userspace.uploads.migrations:03_create_content_table
        path: .meta.target_db

  - name: storage_id
    kind: ns.requirement
    meta:
      description: Storage service ID for file uploads
    default: app:uploads
    targets:
      - entry: userspace.uploads.env:storage_id
        path: .default

  - name: storage_s3
    kind: ns.requirement
    meta:
      description: S3 cloud storage service ID for presigned uploads
    default: app:uploads.s3
    targets:
      - entry: userspace.uploads.env:storage_s3
        path: .default

  - name: router
    kind: ns.requirement
    meta:
      description: HTTP router for uploads API endpoints
    targets:
      - entry: userspace.uploads.api:complete_handler.endpoint
        path: .meta.router
      - entry: userspace.uploads.api:delete_handler.endpoint
        path: .meta.router
      - entry: userspace.uploads.api:get_handler.endpoint
        path: .meta.router
      - entry: userspace.uploads.api:list_handler.endpoint
        path: .meta.router
      - entry: userspace.uploads.api:presigned_handler.endpoint
        path: .meta.router
      - entry: userspace.uploads.api:upload_handler.endpoint
        path: .meta.router

  # Dependencies
  - name: dependency.contract
    kind: ns.dependency
    meta:
      description: Base contracts for content provider
    component: userspace/contract
    version: ">=0.4.0"

  - name: dependency.migration
    kind: ns.dependency
    meta:
      description: Migration framework
    component: wippy/migration
    version: ">=0.3.0"

  - name: dependency.test
    kind: ns.dependency
    meta:
      description: Test framework
      scope: dev
    component: wippy/test
    version: "*"

  # userspace.uploads:content_provider
  - name: content_provider
    kind: contract.binding
    meta:
      comment: Combined contract implementation for uploads (content provider + resource registry)
      tags:
        - content
        - provider
        - resource
        - registry
        - uploads
        - binding
      description: Provides both content access and resource listing via combined contract interface
    contracts:
      - contract: userspace.contract:content_provider
        context_required:
          - upload_id
        methods:
          get_content: userspace.uploads:get_content_func
          get_info: userspace.uploads:get_info_func
      - contract: userspace.contract:resource_registry
        methods:
          count_resources: userspace.uploads:count_resources_func
          list_resources: userspace.uploads:list_resources_func

  # userspace.uploads:content_repo
  - name: content_repo
    kind: library.lua
    meta:
      comment: Repository for managing upload content records
    source: file://content_repo.lua
    modules:
      - json
      - time
      - uuid
    imports:
      uploads_resources: userspace.uploads:uploads_resources

  # userspace.uploads:count_resources_func
  - name: count_resources_func
    kind: function.lua
    meta:
      comment: Function that implements count_resources for resource registry contract
      tags:
        - resource
        - registry
        - counting
    source: file://count_resources_func.lua
    modules:
      - security
      - json
    imports:
      upload_repo: userspace.uploads:upload_repo
    method: handle

  # userspace.uploads:get_content_func
  - name: get_content_func
    kind: function.lua
    meta:
      comment: Function that implements get_content for content provider contract
      tags:
        - content
        - contract
        - provider
    source: file://get_content_func.lua
    modules:
      - security
      - ctx
    imports:
      content_repo: userspace.uploads:content_repo
      upload_repo: userspace.uploads:upload_repo
    method: handle

  # userspace.uploads:get_info_func
  - name: get_info_func
    kind: function.lua
    meta:
      comment: Function that implements get_info for content provider contract
      tags:
        - content
        - contract
        - provider
    source: file://get_info_func.lua
    modules:
      - security
      - ctx
    imports:
      content_repo: userspace.uploads:content_repo
      upload_repo: userspace.uploads:upload_repo
    method: handle

  # userspace.uploads:list_resources_func
  - name: list_resources_func
    kind: function.lua
    meta:
      comment: Function that implements list_resources for resource registry contract
      tags:
        - resource
        - registry
        - listing
        - pagination
    source: file://list_resources_func.lua
    modules:
      - security
      - json
    imports:
      upload_repo: userspace.uploads:upload_repo
    method: handle

  # Queue configuration requirements
  - name: queue_max_length
    kind: ns.requirement
    meta:
      description: Maximum capacity of the upload processing queue
    default: "10000"
    targets:
      - entry: userspace.uploads.env:queue_max_length
        path: .default

  - name: queue_concurrency
    kind: ns.requirement
    meta:
      description: Number of concurrent workers processing uploads
    default: "20"
    targets:
      - entry: userspace.uploads.env:queue_concurrency
        path: .default

  - name: queue_prefetch
    kind: ns.requirement
    meta:
      description: Message buffer size for the upload consumer
    default: "50"
    targets:
      - entry: userspace.uploads.env:queue_prefetch
        path: .default

  # Queue infrastructure for upload processing
  - name: queue_driver
    kind: queue.driver.memory
    lifecycle:
      auto_start: true

  - name: process_queue
    kind: queue.queue
    driver: userspace.uploads:queue_driver
    options:
      queue_name: upload_processing
      max_length: 10000

  # userspace.uploads:process_worker
  - name: process_worker
    kind: function.lua
    meta:
      comment: Queue worker that processes uploaded files through type-specific pipelines
    source: file://process_worker.lua
    modules:
      - json
      - logger
    imports:
      pipeline_lib: userspace.uploads:pipeline_lib
      upload_repo: userspace.uploads:upload_repo
    method: handler

  - name: process_consumer
    kind: queue.consumer
    queue: userspace.uploads:process_queue
    func: userspace.uploads:process_worker
    concurrency: 20
    prefetch: 50
    lifecycle:
      auto_start: true
      depends_on:
        - userspace.uploads:process_queue
      security:
        groups:
          - wippy.security:process

  # userspace.uploads:recover_pending
  - name: recover_pending
    kind: process.lua
    meta:
      comment: Startup function that re-publishes pending uploads to the queue
    source: file://recover_pending.lua
    modules:
      - json
      - queue
      - logger
    imports:
      upload_repo: userspace.uploads:upload_repo
    method: run

  - name: recover_pending.service
    kind: process.service
    meta:
      comment: Re-enqueue pending uploads on startup
    host: app:processes
    lifecycle:
      depends_on:
        - userspace.uploads:process_consumer
      auto_start: true
      security:
        groups:
          - wippy.security:process
    process: recover_pending

  # userspace.uploads:upload_tokens
  - name: upload_tokens
    kind: library.lua
    meta:
      comment: Encrypted token packing for upload completion callbacks
    source: file://upload_tokens.lua
    modules:
      - crypto
      - base64
      - json
      - env

  # userspace.uploads:upload_tokens_test
  - name: upload_tokens_test
    kind: function.lua
    meta:
      type: test
      suite: uploads
      comment: Tests for upload completion token pack/unpack
    source: file://upload_tokens_test.lua
    modules:
      - base64
    imports:
      upload_tokens: userspace.uploads:upload_tokens
      test: wippy.test:test
    method: run

  # userspace.uploads:process_worker_test
  - name: process_worker_test
    kind: function.lua
    meta:
      type: test
      suite: uploads
      comment: Verifies live upload worker security and retry/error behavior.
    source: file://process_worker_test.lua
    modules:
      - registry
    imports:
      process_worker: userspace.uploads:process_worker
      test: wippy.test:test
    method: run

  # userspace.uploads:pipeline_lib
  - name: pipeline_lib
    kind: library.lua
    meta:
      comment: Library for upload processing pipeline functions
    source: file://pipeline_lib.lua
    modules:
      - time
      - funcs
      - security
    imports:
      upload_repo: userspace.uploads:upload_repo
      upload_type: userspace.uploads:upload_type
      upload_tokens: userspace.uploads:upload_tokens

  # userspace.uploads:upload_lib
  - name: upload_lib
    kind: library.lua
    meta:
      comment: Library for handling file uploads to various storage backends
    source: file://upload_lib.lua
    modules:
      - uuid
      - json
      - time
      - queue
      - funcs
      - security
      - logger
    imports:
      upload_repo: userspace.uploads:upload_repo
      upload_type: userspace.uploads:upload_type
      uploads_resources: userspace.uploads:uploads_resources
      content_repo: userspace.uploads:content_repo

  # userspace.uploads:upload_repo
  - name: upload_repo
    kind: library.lua
    meta:
      comment: Repository for managing file uploads
    source: file://upload_repo.lua
    modules:
      - json
      - time
    imports:
      uploads_resources: userspace.uploads:uploads_resources

  # userspace.uploads:upload_type
  - name: upload_type
    kind: library.lua
    meta:
      comment: Library for managing upload types
    source: file://upload_type.lua
    modules:
      - registry
      - time

  # userspace.uploads:uploads_resources
  - name: uploads_resources
    kind: library.lua
    meta:
      comment: Resource accessors for uploads module
    source: file://uploads_resources.lua
    modules:
      - sql
      - env
      - fs
      - cloudstorage

  # userspace.uploads:env_storage
  - name: env_storage
    kind: ns.requirement
    meta:
    description: Environment variable storage location
    targets:
      - entry: userspace.uploads.env:database_resource
        path: .storage
      - entry: userspace.uploads.env:storage_id
        path: .storage
      - entry: userspace.uploads.env:storage_s3
        path: .storage
      - entry: userspace.uploads.env:queue_max_length
        path: .storage
      - entry: userspace.uploads.env:queue_concurrency
        path: .storage
      - entry: userspace.uploads.env:queue_prefetch
        path: .storage
