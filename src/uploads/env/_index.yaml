version: "1.0"
namespace: userspace.uploads.env

entries:
  # userspace.uploads.env:database_resource
  - name: database_resource
    kind: env.variable
    meta:
      comment: Database resource for uploads storage
      icon: tabler:database
      private: true
    default: app:db

  # userspace.uploads.env:storage_id
  - name: storage_id
    kind: env.variable
    meta:
      comment: Storage service ID for file uploads
      icon: tabler:upload
      private: true
    default: app:uploads

  # userspace.uploads.env:storage_s3
  - name: storage_s3
    kind: env.variable
    meta:
      comment: S3 cloud storage service ID for presigned uploads
      icon: tabler:cloud-upload
      private: true
    default: app:uploads.s3

  # userspace.uploads:upload_pipeline_max_queue_size
  - name: upload_pipeline_max_queue_size
    kind: env.variable
    meta:
      comment: Maximum queue size for the upload processing pipeline
      icon: tabler:stack
      private: true
    default: "10000"
    storage: app.env:router
    variable: UPLOAD_PIPELINE_MAX_QUEUE_SIZE

  # userspace.uploads:upload_pipeline_worker_count
  - name: upload_pipeline_worker_count
    kind: env.variable
    meta:
      comment: Number of concurrent workers in the upload processing pipeline
      icon: tabler:users
      private: true
    default: "20"
    storage: app.env:router
    variable: UPLOAD_PIPELINE_WORKER_COUNT

  # userspace.uploads:upload_pipeline_initial_batch_size
  - name: upload_pipeline_initial_batch_size
    kind: env.variable
    meta:
      comment: Initial batch size for loading pending uploads on pipeline startup
      icon: tabler:package
      private: true
    default: "5000"
    storage: app.env:router
    variable: UPLOAD_PIPELINE_INITIAL_BATCH_SIZE
