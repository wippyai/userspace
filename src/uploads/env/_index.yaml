version: "1.0"
namespace: userspace.uploads.env

entries:
  # userspace.uploads.env:database_resource
  - name: database_resource
    kind: env.variable
    meta:
      comment: Database resource for uploads storage
      icon: tabler:database
      private: true
    default: app:db
    storage: app.env:store
    variable: USERSPACE_UPLOADS_DATABASE_RESOURCE

  # userspace.uploads.env:storage_id
  - name: storage_id
    kind: env.variable
    meta:
      comment: Storage service ID for file uploads
      icon: tabler:upload
      private: true
    default: app:uploads
    storage: app.env:store
    variable: USERSPACE_UPLOADS_STORAGE_ID

  # userspace.uploads.env:storage_s3
  - name: storage_s3
    kind: env.variable
    meta:
      comment: S3 cloud storage service ID for presigned uploads
      icon: tabler:cloud-upload
      private: true
    default: app.uploads:s3
    storage: app.env:store
    variable: USERSPACE_UPLOADS_STORAGE_S3

  # userspace.uploads.env:queue_max_length
  - name: queue_max_length
    kind: env.variable
    meta:
      comment: Maximum capacity of the upload processing queue
      icon: tabler:stack
      private: true
    default: "10000"
    storage: app.env:store
    variable: USERSPACE_UPLOADS_QUEUE_MAX_LENGTH

  # userspace.uploads.env:queue_concurrency
  - name: queue_concurrency
    kind: env.variable
    meta:
      comment: Number of concurrent workers processing uploads
      icon: tabler:users
      private: true
    default: "20"
    storage: app.env:store
    variable: USERSPACE_UPLOADS_QUEUE_CONCURRENCY

  # userspace.uploads.env:queue_prefetch
  - name: queue_prefetch
    kind: env.variable
    meta:
      comment: Message buffer size for the upload consumer
      icon: tabler:package
      private: true
    default: "50"
    storage: app.env:store
    variable: USERSPACE_UPLOADS_QUEUE_PREFETCH
