version: "1.0"
namespace: userspace.user.api

entries:
  # userspace.user.api:login
  - name: login
    kind: function.lua
    meta:
      comment: Userspace User Login API
      description: Authentication endpoint with security groups support
      router: app:api.public
    source: file://login.lua
    modules:
      - http
      - security
      - json
      - time
    imports:
      consts: userspace.user:consts
      user_groups_repo: userspace.user.persist:user_groups_repo
      user_repo: userspace.user.persist:user_repo
    method: handler
    
  # userspace.user.api:login.endpoint
  - name: login.endpoint
    kind: http.endpoint
    meta:
      comment: Userspace User Login Endpoint
      description: POST /userspace/user/login - Authenticate user and return token with security groups
      router: app:api.public
    method: POST
    func: login
    path: /user/token
    
  # userspace.user.api:me
  - name: me
    kind: function.lua
    meta:
      comment: Userspace User Profile API
      description: Current user profile with security groups
      router: app:api
    source: file://me.lua
    modules:
      - http
      - security
      - json
      - time
    imports:
      consts: userspace.user:consts
      user_groups_repo: userspace.user.persist:user_groups_repo
    method: handler
    
  # userspace.user.api:me.endpoint
  - name: me.endpoint
    kind: http.endpoint
    meta:
      comment: Userspace User Profile Endpoint
      description: GET /userspace/user/me - Get current user profile with security groups
      router: app:api
    method: GET
    func: me
    path: /user/me
    