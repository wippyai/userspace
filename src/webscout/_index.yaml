version: "1.0"
namespace: userspace.webscout

entries:
  # userspace.webscout:google_search_api_key
  - name: google_search_api_key
    kind: env.variable
    meta:
      comment: Google Custom Search API key for web search functionality
      icon: tabler:search
    storage: app.env:router
    
  # userspace.webscout:google_search_engine_id
  - name: google_search_engine_id
    kind: env.variable
    meta:
      comment: Google Custom Search Engine ID (cx) for search queries
      icon: tabler:search
    storage: app.env:router
    
  # userspace.webscout:user_agent
  - name: user_agent
    kind: env.variable
    meta:
      comment: User agent string for web requests
      icon: tabler:browser
    default: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
    storage: app.env:router
    