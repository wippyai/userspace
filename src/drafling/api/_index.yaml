version: "1.0"
namespace: userspace.drafling.api

entries:
  # userspace.drafling.api:create_entry
  - name: create_entry
    kind: function.lua
    meta:
      comment: Create new entry in project category
    source: file://create_entry.lua
    modules:
      - http
      - json
      - security
    imports:
      writer: userspace.drafling.persist:writer
    method: handler
    
  # userspace.drafling.api:create_entry.endpoint
  - name: create_entry.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: create_entry
    path: /userspace/drafling/projects/{project_id}/entries
    
  # userspace.drafling.api:create_project
  - name: create_project
    kind: function.lua
    meta:
      comment: Create new project from template
    source: file://create_project.lua
    modules:
      - http
      - json
      - security
    imports:
      template_registry: userspace.drafling.discovery:template_registry
      writer: userspace.drafling.persist:writer
    method: handler
    
  # userspace.drafling.api:create_project.endpoint
  - name: create_project.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: create_project
    path: /userspace/drafling/projects
    
  # userspace.drafling.api:delete_entry
  - name: delete_entry
    kind: function.lua
    meta:
      comment: Delete entry from project
    source: file://delete_entry.lua
    modules:
      - http
      - json
      - security
    imports:
      writer: userspace.drafling.persist:writer
    method: handler
    
  # userspace.drafling.api:delete_entry.endpoint
  - name: delete_entry.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: DELETE
    func: delete_entry
    path: /userspace/drafling/projects/{project_id}/entries/{entry_id}
    
  # userspace.drafling.api:delete_project
  - name: delete_project
    kind: function.lua
    meta:
      comment: Delete project
    source: file://delete_project.lua
    modules:
      - http
      - json
      - security
    imports:
      writer: userspace.drafling.persist:writer
    method: handler
    
  # userspace.drafling.api:delete_project.endpoint
  - name: delete_project.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: DELETE
    func: delete_project
    path: /userspace/drafling/projects/{id}
    
  # userspace.drafling.api:get_chat_token
  - name: get_chat_token
    kind: function.lua
    meta:
      comment: Generate start token for drafling agent with project context
    source: file://get_chat_token.lua
    modules:
      - http
      - json
      - security
    imports:
      agent_registry: wippy.agent.discovery:registry
      doc_repo: userspace.drafling.persist:doc_repo
      start_tokens: wippy.session:start_tokens
      template_registry: userspace.drafling.discovery:template_registry
    method: handler
    
  # userspace.drafling.api:get_chat_token.endpoint
  - name: get_chat_token.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: POST
    func: get_chat_token
    path: /userspace/drafling/projects/{project_id}/chat-token
    
  # userspace.drafling.api:get_project
  - name: get_project
    kind: function.lua
    meta:
      comment: Get single project by ID
    source: file://get_project.lua
    modules:
      - http
      - json
      - security
    imports:
      doc_repo: userspace.drafling.persist:doc_repo
