  # userspace.drafling.persist:doc_reader
  - name: doc_reader
    kind: library.lua
    meta:
      name: Document Reader
      comment: Comprehensive fluent API for reading projects with related data
      tags:
        - drafling
        - projects
        - query
        - reader
        - fluent
      description: |-
        Provides a fluent, immutable API for reading projects with categories and entries.
        Supports complex filtering, joining, and fetching options.
    source: file://doc_reader.lua
    modules:
      - sql
      - json
    imports:
      drafling_consts: userspace.drafling:consts
    
  # userspace.drafling.persist:doc_reader_test
  - name: doc_reader_test
    kind: function.lua
    meta:
      name: Document Reader Tests
      type: test
      comment: Unit tests for the project reader fluent API
      group: Components / Drafling
      tags:
        - drafling
        - projects
        - reader
        - tests
      description: Tests the fluent API for reading projects with complex filtering and joining
    source: file://doc_reader_test.lua
    modules:
      - sql
      - uuid
      - json
      - time
    imports:
      doc_reader: userspace.drafling.persist:doc_reader
      drafling_consts: userspace.drafling:consts
      test: wippy.test:test
    method: run_tests
    
