version: "1.0"
namespace: userspace.mcp.env

entries:
  # userspace.mcp.env:client_name
  - name: client_name
    kind: env.variable
    meta:
      comment: MCP client identification name
    default: wippy-mcp-client
    storage: app.env:router
    variable: MCP_CLIENT_NAME
    
  # userspace.mcp.env:client_version
  - name: client_version
    kind: env.variable
    meta:
      comment: MCP client version
    default: 1.0.0
    storage: app.env:router
    variable: MCP_CLIENT_VERSION
    
  # userspace.mcp.env:executor_id
  - name: executor_id
    kind: env.variable
    meta:
      comment: Default executor ID for MCP process spawning
    default: userspace.mcp:executor
    storage: app.env:router
    variable: MCP_EXECUTOR_ID
    
  # userspace.mcp.env:protocol_version
  - name: protocol_version
    kind: env.variable
    meta:
      comment: MCP protocol version to use
    default: "2024-11-05"
    storage: app.env:router
    variable: MCP_PROTOCOL_VERSION
    