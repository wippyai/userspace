version: "1.0"
namespace: userspace.mcp

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Userspace MCP
      description: Model Context Protocol client

  # Lets the consuming app repoint where the env variables below are read from,
  # matching userspace/users and userspace/uploads. Defaults to app.env:router
  # so existing apps keep working.
  - name: env_storage
    kind: ns.requirement
    meta:
      description: Environment variable storage location
    default: app.env:router
    targets:
      - entry: userspace.mcp.env:client_name
        path: .storage
      - entry: userspace.mcp.env:client_version
        path: .storage
      - entry: userspace.mcp.env:executor_id
        path: .storage
      - entry: userspace.mcp.env:protocol_version
        path: .storage

  # userspace.mcp:client
  - name: client
    kind: library.lua
    meta:
      comment: MCP client communication library
      tags:
        - mcp
        - client
        - communication
    source: file://client.lua
    modules:
      - json
      - time
      - logger
      - uuid
      - security
    imports:
      mcp_consts: userspace.mcp:consts
    
  # userspace.mcp:consts
  - name: consts
    kind: library.lua
    meta:
      comment: MCP system constants and configuration management
    source: file://consts.lua
    modules:
      - env
    
  # userspace.mcp:executor
  - name: executor
    kind: exec.native
    meta:
      comment: MCP process execution service (for local MCP)
    default_work_dir: ""
    
  # userspace.mcp:mcp.spec
  - name: mcp.spec
    kind: registry.entry
    meta:
      type: module.spec
      comment: Model Context Protocol (MCP) integration for tool servers - client communication, server registration, and process management
      tags:
        - mcp
        - tools
        - client
        - server
        - integration
        - protocol
    source: file://mcp.spec.md
    