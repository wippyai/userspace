version: "1.0"
namespace: userspace.knowledge.views

entries:
  - name: templates
    kind: template.set
    meta:
      description: Knowledge view template set
    engine:
      development_mode: true

  # userspace.knowledge.views:dashboard
  - name: dashboard
    kind: template.jet
    meta:
      name: knowledge_base
      type: view.page
      title: Knowledge Bases
      icon: tabler:brain
      description: Manage and discover knowledge base components
      order: 300
      content_type: text/html
      announced: true
      secure: true
    source: file://dashboard.jet
    set: userspace.knowledge.views:templates
