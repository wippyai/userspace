version: "1.0"
namespace: userspace.credentials.views

entries:
  # userspace.credentials.views:create_credential_connection
  - name: create_credential_connection
    kind: template.jet
    meta:
      name: create_credential_connection
      type: view.page
      title: Create Credential Connection
      icon: tabler:key
      description: Configure and create a credential connection to a service provider
      content_type: text/html
      secure: true
    source: file://create_credential_connection.jet
    set: app.views.common:templates
    
  # userspace.credentials.views:manage_credential_connection
  - name: manage_credential_connection
    kind: template.jet
    meta:
      name: manage_credential_connection
      type: view.page
      title: Manage Credential Connection
      icon: tabler:settings
      description: Manage and configure credential connection settings
      content_type: text/html
      secure: true
    source: file://manage_credential_connection.jet
    set: app.views.common:templates
    