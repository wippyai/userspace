version: "1.0"
namespace: userspace.credentials

entries:
  # userspace.credentials:credential_validator
  - name: credential_validator
    kind: contract.definition
    meta:
      comment: Contract for provider-specific credential normalization and validation
      tags:
        - credentials
        - validation
        - normalization
        - providers
      description: Validates form input and normalizes credentials before storage
    methods:
      - name: normalize_and_validate
        description: |
          Validates form input, tests connectivity, and returns normalized credentials.
          Providers implement this to handle their specific validation logic.
          Calling: normalize_and_validate(form_data)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "description": "Raw form data from frontend",
                "additionalProperties": true
              }
            format: application/schema+json
        output_schemas:
          - definition: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"success\": {\n      \"type\": \"boolean\",\n      \"description\": \"Whether validation was successful\"\n    },\n    \"normalized_credentials\": {\n      \"type\": \"object\",\n      \"description\": \"Cleaned and validated credentials to store\",\n      \"additionalProperties\": true\n    },\n    \"error\": {\n      \"type\": \"string\",\n      \"description\": \"Error message if validation failed\"\n    },\n    \"field\": {\n      \"type\": \"string\", \n      \"description\": \"Field that failed validation\"\n    }\n  },\n  \"required\": [\"success\"]\n}\n"
            format: application/schema+json
    
  # userspace.credentials:credentials_contract
  - name: credentials_contract
    kind: contract.definition
    meta:
      comment: Secure credentials storage contract matching repository implementation
      tags:
        - credentials
        - security
        - encryption
        - access-control
      description: Provides secure credential storage and retrieval with access-level filtering based on repository structure
    methods:
      - name: get_credentials
        description: |
          Get stored credentials for a component.
          Returns full credential data including connection metadata.
          Calling: get_credentials(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {},
                "default": {}
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "component_id": {
                    "type": "string",
                    "description": "Component ID"
                  },
                  "connection_name": {
                    "type": "string",
                    "description": "Connection name"
                  },
                  "connection_description": {
                    "type": "string",
                    "description": "Connection description"
                  },
                  "credentials": {
                    "type": "object",
                    "description": "Decrypted credential data",
                    "additionalProperties": true
                  },
                  "metadata": {
                    "type": "object",
                    "description": "Unencrypted metadata",
                    "additionalProperties": true
                  },
                  "created_at": {
                    "type": "string",
                    "description": "Credential creation timestamp"
                  },
                  "updated_at": {
                    "type": "string",
                    "description": "Credential last update timestamp"
                  }
                },
                "required": ["component_id", "connection_name", "credentials", "metadata", "created_at", "updated_at"]
              }
            format: application/schema+json
      - name: store_credentials
        description: |
          Store or update credentials for a component. Requires WRITE access or higher.
          Encrypts and stores credential data with connection metadata.
          Calling: store_credentials(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "connection_name": {
                    "type": "string",
                    "description": "Name for this connection"
                  },
                  "connection_description": {
                    "type": "string",
                    "description": "Optional description for this connection"
                  },
                  "credentials": {
                    "type": "object",
                    "description": "Credential data to encrypt and store",
                    "additionalProperties": true
                  },
                  "metadata": {
                    "type": "object",
                    "description": "Metadata for the credentials (stored unencrypted)",
                    "additionalProperties": true
                  }
                },
                "required": ["connection_name", "credentials"]
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "success": {
                    "type": "boolean",
                    "description": "Whether storage was successful"
                  },
                  "component_id": {
                    "type": "string",
                    "description": "Component ID of stored credentials"
                  },
                  "created_at": {
                    "type": "string",
                    "description": "Storage timestamp"
                  },
                  "updated_at": {
                    "type": "string",
                    "description": "Last update timestamp"
                  }
                },
                "required": ["success", "component_id", "created_at", "updated_at"]
              }
            format: application/schema+json
      - name: get_connection_metadata
        description: |
          Get connection metadata without decrypting credentials.
          Requires READ access. Returns basic info without sensitive credential data.
          Calling: get_connection_metadata(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {},
                "default": {}
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "component_id": {
                    "type": "string",
                    "description": "Component ID"
                  },
                  "connection_name": {
                    "type": "string",
                    "description": "Connection name"
                  },
                  "connection_description": {
                    "type": "string",
                    "description": "Connection description"
                  },
                  "metadata": {
                    "type": "object",
                    "description": "Credential metadata",
                    "additionalProperties": true
                  },
                  "created_at": {
                    "type": "string",
                    "description": "Creation timestamp"
                  },
                  "updated_at": {
                    "type": "string",
                    "description": "Last update timestamp"
                  }
                },
                "required": ["component_id", "connection_name", "metadata", "created_at", "updated_at"]
              }
            format: application/schema+json
      - name: get_info
        description: |
          Get basic information about the credentials component.
          Requires READ access. Returns whether credentials exist and basic metadata.
          Calling: get_info(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {},
                "default": {}
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "component_id": {
                    "type": "string",
                    "description": "Component ID"
                  },
                  "has_credentials": {
                    "type": "boolean",
                    "description": "Whether credentials are stored"
                  },
                  "connection_name": {
                    "type": "string",
                    "description": "Connection name if credentials exist"
                  },
                  "metadata": {
                    "type": "object",
                    "description": "Credential metadata if credentials exist",
                    "additionalProperties": true
                  },
                  "created_at": {
                    "type": "string",
                    "description": "Creation timestamp if credentials exist"
                  },
                  "updated_at": {
                    "type": "string",
                    "description": "Last update timestamp if credentials exist"
                  }
                },
                "required": ["component_id", "has_credentials"]
              }
            format: application/schema+json
    
  # userspace.credentials:credentials_store
  - name: credentials_store
    kind: contract.binding
    meta:
      comment: Secure encrypted credential storage implementation
      tags:
        - credentials
        - implementation
        - security
        - encryption
      description: Internal service for secure credential storage and retrieval
    contracts:
      - contract: userspace.credentials:credentials_contract
        context_required:
          - component_id
        default: true
        methods:
          get_connection_metadata: userspace.credentials:get_connection_metadata_func
          get_credentials: userspace.credentials:get_credentials_func
          get_info: userspace.credentials:get_info_func
          store_credentials: userspace.credentials:store_credentials_func
      - contract: userspace.contract:deletable
        context_required:
          - component_id
        methods:
          delete: userspace.credentials:delete_func
      - contract: userspace.contract:component
        context_required:
          - component_id
        methods:
          get_status: userspace.credentials:get_status_func
    
  # userspace.credentials:delete_func
  - name: delete_func
    kind: function.lua
    meta:
      comment: Delete function for credentials cleanup
      tags:
        - credentials
        - delete
        - cleanup
    source: file://delete_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handle
    
  # userspace.credentials:get_connection_metadata_func
  - name: get_connection_metadata_func
    kind: function.lua
    meta:
      comment: Get connection metadata without decryption
      tags:
        - credentials
        - metadata
        - no-decrypt
    source: file://get_connection_metadata_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handle
    
  # userspace.credentials:get_credentials_func
  - name: get_credentials_func
    kind: function.lua
    meta:
      comment: Get full credentials with decryption
      tags:
        - credentials
        - get
        - decrypt
    source: file://get_credentials_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handle
    
  # userspace.credentials:get_info_func
  - name: get_info_func
    kind: function.lua
    meta:
      comment: Get basic credentials component information
      tags:
        - credentials
        - info
    source: file://get_info_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handle
    
  # userspace.credentials:get_status_func
  - name: get_status_func
    kind: function.lua
    meta:
      comment: Get status function for credentials component
      tags:
        - credentials
        - status
        - component
    source: file://get_status_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handle
    
  # userspace.credentials:store_credentials_func
  - name: store_credentials_func
    kind: function.lua
    meta:
      comment: Store or update encrypted credentials
      tags:
        - credentials
        - store
        - encryption
    source: file://store_credentials_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handle
    