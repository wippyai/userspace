version: "1.0"
namespace: userspace.credentials.api

entries:
  # userspace.credentials.api:api_error
  - name: api_error
    kind: library.lua
    meta:
      comment: Helper that logs raw errors server-side and returns sanitized client responses
    source: file://api_error.lua
    modules:
      - logger

  # userspace.credentials.api:create_connection
  - name: create_connection
    kind: function.lua
    meta:
      comment: Creates credential connection with provider credentials
    source: file://create_connection.lua
    modules:
      - http
      - json
      - contract
      - uuid
      - security
      - logger
    imports:
      api_error: userspace.credentials.api:api_error
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handler

  # userspace.credentials.api:create_connection.endpoint
  - name: create_connection.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that creates credential connection
      router: app:api
    method: POST
    func: create_connection
    path: /userspace/credentials/providers/{provider_name}/create

  # userspace.credentials.api:discover_providers
  - name: discover_providers
    kind: function.lua
    meta:
      comment: Discovers available credential providers for connection
    source: file://discover_providers.lua
    modules:
      - http
      - json
      - contract
    imports:
      api_error: userspace.credentials.api:api_error
    method: handler

  # userspace.credentials.api:discover_providers.endpoint
  - name: discover_providers.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that discovers available credential providers
      router: app:api
    method: GET
    func: discover_providers
    path: /userspace/credentials/providers/discover

  # userspace.credentials.api:get_connection_details
  - name: get_connection_details
    kind: function.lua
    meta:
      comment: Get credential connection details for management interface
    source: file://get_connection_details.lua
    modules:
      - http
      - json
      - contract
      - security
    imports:
      api_error: userspace.credentials.api:api_error
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handler

  # userspace.credentials.api:get_connection_details.endpoint
  - name: get_connection_details.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint to get credential connection details
      router: app:api
    method: GET
    func: get_connection_details
    path: /userspace/credentials/connections/{component_id}

  # userspace.credentials.api:get_provider_info
  - name: get_provider_info
    kind: function.lua
    meta:
      comment: Gets detailed information about a specific credential provider
    source: file://get_provider_info.lua
    modules:
      - http
      - json
      - contract
    imports:
      api_error: userspace.credentials.api:api_error
    method: handler

  # userspace.credentials.api:get_provider_info.endpoint
  - name: get_provider_info.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that gets credential provider information
      router: app:api
    method: GET
    func: get_provider_info
    path: /userspace/credentials/providers/{provider_name}

  # userspace.credentials.api:update_connection
  - name: update_connection
    kind: function.lua
    meta:
      comment: Updates existing credential connection with new credentials
    source: file://update_connection.lua
    modules:
      - http
      - json
      - contract
      - uuid
      - security
      - logger
    imports:
      api_error: userspace.credentials.api:api_error
      component: userspace.component:component
      credentials_repo: userspace.credentials.persist:credentials_repo
    method: handler

  # userspace.credentials.api:update_connection.endpoint
  - name: update_connection.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that updates credential connection
      router: app:api
    method: PUT
    func: update_connection
    path: /userspace/credentials/connections/{component_id}
