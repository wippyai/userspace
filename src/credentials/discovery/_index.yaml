version: "1.0"
namespace: userspace.credentials.discovery

entries:
  # userspace.credentials.discovery:get_component_contract_func
  - name: get_component_contract_func
    kind: function.lua
    meta:
      comment: Get component contract ID for credential component registration
      tags:
        - credentials
        - providers
        - discovery
        - component
        - contract
    source: file://get_component_contract_func.lua
    modules:
      - registry
    imports:
      provider_registry: userspace.credentials.discovery:provider_registry
    method: handle
    
  # userspace.credentials.discovery:get_provider_info_func
  - name: get_provider_info_func
    kind: function.lua
    meta:
      comment: Get detailed information about a specific credential provider
      tags:
        - credentials
        - providers
        - discovery
        - registry
    source: file://get_provider_info_func.lua
    modules:
      - registry
    imports:
      provider_registry: userspace.credentials.discovery:provider_registry
    method: handle
    
  # userspace.credentials.discovery:list_available_providers_func
  - name: list_available_providers_func
    kind: function.lua
    meta:
      comment: List all available credential providers for connection
      tags:
        - credentials
        - providers
        - discovery
        - registry
    source: file://list_available_providers_func.lua
    modules:
      - registry
      - json
    imports:
      provider_registry: userspace.credentials.discovery:provider_registry
    method: handle
    
  # userspace.credentials.discovery:provider_discovery
  - name: provider_discovery
    kind: contract.definition
    meta:
      comment: Credential provider discovery service contract
      tags:
        - credentials
        - providers
        - discovery
        - registry
      description: Discovers available credential providers from registry and provides schema and UI configuration
    methods:
      - name: list_available_providers
        description: |
          List all available credential providers that can be connected.
          Scans registry for registry.entry entries with meta.credential_provider.
          Returns schemas and UI config from root level, no implementation details.
          Calling: list_available_providers(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "filters": {
                    "type": "object",
                    "properties": {
                      "groups": {
                        "type": "array",
                        "items": {"type": "string"},
                        "description": "Filter by provider groups (e.g., Development, Databases, AI & Machine Learning)"
                      },
                      "classes": {
                        "type": "array",
                        "items": {"type": "string"},
                        "description": "Filter by provider classes (e.g., credential_connection, database_services)"
                      }
                    }
                  }
                },
                "default": {}
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "providers": {
                    "type": "array",
                    "items": {
                      "type": "object",
                      "properties": {
                        "id": {"type": "string"},
                        "name": {"type": "string"},
                        "title": {"type": "string"},
                        "description": {"type": "string"},
                        "icon": {"type": "string"},
                        "credential_provider": {"type": "string"},
                        "group": {"type": "string"},
                        "classes": {
                          "type": "array",
                          "items": {"type": "string"}
                        },
                        "tags": {
                          "type": "array",
                          "items": {"type": "string"}
                        },
                        "namespace": {"type": "string"},
                        "create_ui_id": {"type": "string"},
                        "manage_ui_id": {"type": "string"},
                        "credential_schema": {
                          "type": "object",
                          "description": "JSON Schema for credential fields"
                        },
                        "ui_config": {
                          "type": "object",
                          "description": "UI rendering configuration"
                        }
                      },
                      "required": ["id", "name", "title", "credential_provider", "namespace"]
                    }
                  },
                  "total_count": {"type": "integer"},
                  "available_groups": {
                    "type": "array",
                    "items": {"type": "string"},
                    "description": "All available provider groups for filtering"
                  },
                  "available_classes": {
                    "type": "array",
                    "items": {"type": "string"},
                    "description": "All available provider classes for filtering"
                  }
                },
                "required": ["providers", "total_count", "available_groups", "available_classes"]
              }
            format: application/schema+json
      - name: get_provider_info
        description: |
          Get detailed information about a specific credential provider.
          Can lookup by provider ID or by credential_provider field value.
          Returns schema and UI config from root level, no implementation details.
          Calling: get_provider_info(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "provider_id": {
                    "type": "string",
                    "description": "Provider registry ID to get info for"
                  },
                  "credential_provider": {
                    "type": "string",
                    "description": "Credential provider name (e.g., 'jira') to lookup by meta.credential_provider"
                  }
                },
                "anyOf": [
                  {"required": ["provider_id"]},
                  {"required": ["credential_provider"]}
                ]
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "id": {"type": "string"},
                  "name": {"type": "string"},
                  "title": {"type": "string"},
                  "description": {"type": "string"},
                  "icon": {"type": "string"},
                  "credential_provider": {"type": "string"},
                  "group": {"type": "string"},
                  "classes": {
                    "type": "array",
                    "items": {"type": "string"}
                  },
                  "tags": {
                    "type": "array",
                    "items": {"type": "string"}
                  },
                  "namespace": {"type": "string"},
                  "create_ui_id": {"type": "string"},
                  "manage_ui_id": {"type": "string"},
                  "credential_schema": {
                    "type": "object",
                    "description": "JSON Schema for credential fields"
                  },
                  "ui_config": {
                    "type": "object",
                    "description": "UI rendering configuration"
                  }
                },
                "required": ["id", "name", "title", "credential_provider", "namespace", "credential_schema", "ui_config"]
              }
            format: application/schema+json
      - name: get_component_contract
        description: |
          Get the component contract ID for registering credential connection components.
          Returns the contract ID that should be used for component registration.
          Calling: get_component_contract(request_dto)
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "provider_id": {
                    "type": "string",
                    "description": "Provider registry ID to get component contract for"
                  },
                  "credential_provider": {
                    "type": "string",
                    "description": "Credential provider name (e.g., 'jira') to lookup by meta.credential_provider"
                  }
                },
                "anyOf": [
                  {"required": ["provider_id"]},
                  {"required": ["credential_provider"]}
                ]
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "component_contract_id": {
                    "type": "string",
                    "description": "Contract ID to use for component registration (defaults to userspace.credentials:credentials_store)"
                  },
                  "provider_id": {
                    "type": "string",
                    "description": "Provider registry entry ID"
                  },
                  "credential_provider": {
                    "type": "string",
                    "description": "Credential provider name"
                  }
                },
                "required": ["component_contract_id", "provider_id", "credential_provider"]
              }
            format: application/schema+json
    
  # userspace.credentials.discovery:provider_discovery_impl
  - name: provider_discovery_impl
    kind: contract.binding
    meta:
      comment: Default implementation of credential provider discovery contract
      tags:
        - credentials
        - providers
        - discovery
        - implementation
    contracts:
      - contract: userspace.credentials.discovery:provider_discovery
        default: true
        methods:
          get_component_contract: userspace.credentials.discovery:get_component_contract_func
          get_provider_info: userspace.credentials.discovery:get_provider_info_func
          list_available_providers: userspace.credentials.discovery:list_available_providers_func
    
  # userspace.credentials.discovery:provider_registry
  - name: provider_registry
    kind: library.lua
    meta:
      comment: Credential provider registry library for discovering available credential providers
      tags:
        - credentials
        - providers
        - discovery
        - registry
    source: file://provider_registry.lua
    modules:
      - registry
      - json
    