version: "1.0"
namespace: userspace.oauth

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Userspace OAuth
      description: OAuth 2.0 connection management with PKCE support

  # userspace.oauth:base_connector
  - name: base_connector
    kind: contract.binding
    meta:
      comment: Generic OAuth 2.0 provider implementation with PKCE support and token refresh
      tags:
        - oauth
        - provider
        - implementation
        - generic
    contracts:
      - contract: userspace.oauth:connector
        methods:
          handle_callback: userspace.oauth:handle_callback_func
          init_oauth: userspace.oauth:init_oauth_func
          refresh_token: userspace.oauth:refresh_token_func

  # userspace.oauth:connector
  - name: connector
    kind: contract.definition
    meta:
      comment: OAuth 2.0 handler contract for provider authentication flows
      tags:
        - oauth
        - authentication
        - provider
      description: Standard interface for OAuth 2.0 authorization code flow with PKCE and token refresh
    methods:
      - name: init_oauth
        description: |
          Initialize OAuth flow by generating authorization URL and state.

          Example:
          - { "redirect_uri": "https://app.com/oauth/callback", "scopes": ["email", "profile"] }
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "redirect_uri": {
                    "type": "string",
                    "description": "URI where user will be redirected after authorization"
                  },
                  "scopes": {
                    "type": "array",
                    "items": {"type": "string"},
                    "description": "OAuth scopes to request"
                  }
                },
                "required": ["redirect_uri"]
              }
            format: application/schema+json
        output_schemas:
          - definition: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"success\": {\n      \"type\": \"boolean\",\n      \"description\": \"Whether initialization was successful\"\n    },\n    \"authorization_url\": {\n      \"type\": \"string\",\n      \"description\": \"Complete OAuth authorization URL to redirect user to\"\n    },\n    \"state_token\": {\n      \"type\": \"string\", \n      \"description\": \"State token for this flow\"\n    },\n    \"storage_payload\": {\n      \"type\": \"object\",\n      \"description\": \"Data to store using state_token as key\"\n    },\n    \"expires_in\": {\n      \"type\": \"integer\",\n      \"description\": \"State expiration time in seconds\"\n    },\n    \"error\": {\n      \"type\": \"string\",\n      \"description\": \"Error message if initialization failed\"\n    }\n  },\n  \"required\": [\"success\"]\n}\n"
            format: application/schema+json
      - name: handle_callback
        description: |
          Handle OAuth callback and complete authorization flow.

          Example:
          - { "code": "auth_code", "state": "abc123", "stored_data": {"code_verifier": "xyz", "redirect_uri": "..."} }
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "code": {
                    "type": "string",
                    "description": "Authorization code from OAuth provider"
                  },
                  "state": {
                    "type": "string",
                    "description": "State parameter from OAuth response"
                  },
                  "error": {
                    "type": "string",
                    "description": "Error parameter from OAuth response"
                  },
                  "error_description": {
                    "type": "string",
                    "description": "Error description from OAuth response"
                  },
                  "stored_data": {
                    "type": "object",
                    "description": "Data retrieved from storage using state token"
                  }
                },
                "required": ["state", "stored_data"]
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "success": {
                    "type": "boolean",
                    "description": "Whether callback was handled successfully"
                  },
                  "oauth_connection": {
                    "type": "object",
                    "properties": {
                      "access_token": {
                        "type": "string",
                        "description": "OAuth access token"
                      },
                      "refresh_token": {
                        "type": "string",
                        "description": "OAuth refresh token (if provided)"
                      },
                      "token_type": {
                        "type": "string",
                        "description": "Token type (usually 'Bearer')"
                      },
                      "expires_in": {
                        "type": "integer",
                        "description": "Token expiration time in seconds"
                      },
                      "expires_at": {
                        "type": "integer",
                        "description": "Unix timestamp when token expires"
                      },
                      "scope": {
                        "type": "string",
                        "description": "Granted OAuth scopes"
                      },
                      "scopes_granted": {
                        "type": "string",
                        "description": "Space-separated list of granted scopes"
                      },
                      "scopes_requested": {
                        "type": "array",
                        "items": {"type": "string"},
                        "description": "Array of originally requested scopes"
                      },
                      "redirect_uri": {
                        "type": "string",
                        "description": "OAuth redirect URI used for this connection"
                      },
                      "is_active": {
                        "type": "boolean",
                        "description": "Whether the connection is active"
                      },
                      "connection_state": {
                        "type": "string",
                        "description": "Current connection state"
                      },
                      "created_at": {
                        "type": "integer",
                        "description": "Unix timestamp when connection was created"
                      },
                      "last_token_refresh": {
                        "type": "integer",
                        "description": "Unix timestamp of last token refresh"
                      },
                      "provider_token_response": {
                        "type": "object",
                        "description": "Raw token response from provider for debugging"
                      }
                    },
                    "required": ["access_token", "is_active"],
                    "additionalProperties": true,
                    "description": "OAuth connection information with tokens and connection metadata"
                  },
                  "user_context": {
                    "type": "object",
                    "properties": {
                      "provider_user_id": {
                        "type": "string",
                        "description": "User ID from OAuth provider"
                      },
                      "email": {
                        "type": "string",
                        "description": "User email from provider (when available)"
                      },
                      "display_name": {
                        "type": "string",
                        "description": "User display name from provider (when available)"
                      },
                      "username": {
                        "type": "string",
                        "description": "Username from provider (when available)"
                      },
                      "avatar_url": {
                        "type": "string",
                        "description": "User avatar URL from provider (when available)"
                      },
                      "first_name": {
                        "type": "string",
                        "description": "User first name from provider (when available)"
                      },
                      "last_name": {
                        "type": "string",
                        "description": "User last name from provider (when available)"
                      },
                      "locale": {
                        "type": "string",
                        "description": "User locale from provider (when available)"
                      },
                      "provider_data": {
                        "type": "object",
                        "description": "Raw user data from provider for provider-specific fields"
                      }
                    },
                    "required": ["provider_user_id"],
                    "additionalProperties": true,
                    "description": "User profile information from OAuth provider"
                  },
                  "error": {
                    "type": "string",
                    "description": "Error message if callback handling failed"
                  }
                },
                "required": ["success"]
              }
            format: application/schema+json
      - name: refresh_token
        description: |
          Refresh OAuth access token using refresh token.

          Example:
          - { "refresh_token": "refresh_abc123" }
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "refresh_token": {
                    "type": "string",
                    "description": "Refresh token to use for getting new access token"
                  }
                },
                "required": ["refresh_token"]
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "success": {
                    "type": "boolean",
                    "description": "Whether token refresh was successful"
                  },
                  "access_token": {
                    "type": "string",
                    "description": "New access token"
                  },
                  "refresh_token": {
                    "type": "string",
                    "description": "New refresh token (if provider rotates refresh tokens)"
                  },
                  "token_type": {
                    "type": "string",
                    "description": "Token type (usually 'Bearer')"
                  },
                  "expires_in": {
                    "type": "integer",
                    "description": "Token expiration time in seconds from now"
                  },
                  "scope": {
                    "type": "string",
                    "description": "Granted OAuth scopes for new token"
                  },
                  "error": {
                    "type": "string",
                    "description": "Error message if refresh failed"
                  },
                  "response_received": {
                    "type": "boolean",
                    "description": "Whether an HTTP response was received from the OAuth provider (false indicates network connectivity issues)"
                  }
                },
                "required": ["success"]
              }
            format: application/schema+json

  # userspace.oauth:delete_connection_func
  - name: delete_connection_func
    kind: function.lua
    meta:
      comment: Delete OAuth connection and clean up all data
      tags:
        - oauth
        - delete
        - cleanup
    source: file://delete_connection_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      oauth_repo: userspace.oauth.persist:oauth_repo
    method: handle

  # userspace.oauth:get_access_token_func
  - name: get_access_token_func
    kind: function.lua
    meta:
      comment: Get current access token for OAuth connection
      tags:
        - oauth
        - token
        - access
    source: file://get_access_token_func.lua
    modules:
      - ctx
      - time
    imports:
      component: userspace.component:component
      oauth_repo: userspace.oauth.persist:oauth_repo
    method: handle

  # userspace.oauth:get_connection_status_func
  - name: get_connection_status_func
    kind: function.lua
    meta:
      comment: Get OAuth connection status for component interface
      tags:
        - oauth
        - status
        - component
    source: file://get_connection_status_func.lua
    modules:
      - ctx
      - time
    imports:
      component: userspace.component:component
      oauth_repo: userspace.oauth.persist:oauth_repo
    method: handle

  # userspace.oauth:get_info_func
  - name: get_info_func
    kind: function.lua
    meta:
      comment: Get OAuth connection information and metadata
      tags:
        - oauth
        - connection
        - info
    source: file://get_info_func.lua
    modules:
      - ctx
    imports:
      component: userspace.component:component
      oauth_repo: userspace.oauth.persist:oauth_repo
    method: handle

  # userspace.oauth:handle_callback_func
  - name: handle_callback_func
    kind: function.lua
    meta:
      comment: Handle OAuth callback for any provider using context
      tags:
        - oauth
        - callback
        - token-exchange
    source: file://handle_callback_func.lua
    modules:
      - http_client
      - json
      - ctx
      - env
      - logger
    method: handle

  # userspace.oauth:init_oauth_func
  - name: init_oauth_func
    kind: function.lua
    meta:
      comment: Initialize OAuth flow for any provider using context
      tags:
        - oauth
        - initialization
        - pkce
    source: file://init_oauth_func.lua
    modules:
      - ctx
      - env
      - hash
      - crypto
      - logger
      - base64
    method: handle

  # userspace.oauth:oauth_connection
  - name: oauth_connection
    kind: contract.binding
    meta:
      name: OAuth Connection
      comment: OAuth connection component for authenticated access to external providers
      tags:
        - oauth
        - connection
        - authentication
        - token
      class:
        - connection
        - oauth_connection
    contracts:
      - contract: userspace.oauth:oauth_connection_contract
        context_required:
          - component_id
        default: true
        methods:
          get_access_token: userspace.oauth:get_access_token_func
          get_info: userspace.oauth:get_info_func
      - contract: userspace.contract:deletable
        context_required:
          - component_id
        methods:
          delete: userspace.oauth:delete_connection_func
      - contract: userspace.contract:component
        context_required:
          - component_id
        methods:
          get_status: userspace.oauth:get_connection_status_func

  # userspace.oauth:oauth_connection_contract
  - name: oauth_connection_contract
    kind: contract.definition
    meta:
      comment: OAuth connection contract for managing authenticated connections to external providers
      tags:
        - oauth
        - connection
        - token
        - authentication
      description: Interface for OAuth connection components providing token access and connection management
    methods:
      - name: get_access_token
        description: |
          Get current access token and expiration information.
          Returns the active token or error if expired/invalid.
          Calling: get_access_token()
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "success": {
                    "type": "boolean",
                    "description": "Whether token retrieval was successful"
                  },
                  "access_token": {
                    "type": "string",
                    "description": "Current access token"
                  },
                  "token_type": {
                    "type": "string",
                    "description": "Token type (usually Bearer)"
                  },
                  "expires_at": {
                    "type": "integer",
                    "description": "Unix timestamp when token expires"
                  },
                  "is_expired": {
                    "type": "boolean",
                    "description": "Whether the token is currently expired"
                  },
                  "error": {
                    "type": "string",
                    "description": "Error message if retrieval failed"
                  }
                },
                "required": ["success"]
              }
            format: application/schema+json
      - name: get_info
        description: |
          Get detailed OAuth connection information and metadata.
          Calling: get_info()
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "provider": {
                    "type": "string",
                    "description": "OAuth provider name"
                  },
                  "connection_name": {
                    "type": "string",
                    "description": "User-defined connection name"
                  },
                  "connection_description": {
                    "type": "string",
                    "description": "Connection description"
                  },
                  "scopes_granted": {
                    "type": "string",
                    "description": "Space-separated granted scopes"
                  },
                  "connection_state": {
                    "type": "string",
                    "description": "Current connection state"
                  },
                  "created_at": {
                    "type": "string",
                    "description": "When connection was created"
                  },
                  "last_token_refresh": {
                    "type": "string",
                    "description": "When token was last refreshed"
                  },
                  "user_profile": {
                    "type": "object",
                    "description": "User profile from OAuth provider",
                    "properties": {
                      "provider_user_id": {"type": "string"},
                      "email": {"type": "string"},
                      "display_name": {"type": "string"},
                      "username": {"type": "string"},
                      "avatar_url": {"type": "string"}
                    }
                  }
                },
                "required": ["provider", "connection_name", "connection_state", "created_at"]
              }
            format: application/schema+json

  # userspace.oauth:refresh_token_func
  - name: refresh_token_func
    kind: function.lua
    meta:
      comment: Refresh OAuth access token using refresh token for any provider using context
      tags:
        - oauth
        - refresh
        - token
    source: file://refresh_token_func.lua
    modules:
      - http_client
      - json
      - ctx
      - env
      - logger
    method: handle
