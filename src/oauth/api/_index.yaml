version: "1.0"
namespace: userspace.oauth.api

entries:
  # userspace.oauth.api:discover_providers
  - name: discover_providers
    kind: function.lua
    meta:
      comment: Discovers available OAuth providers for connection
    source: file://discover_providers.lua
    modules:
      - http
      - json
      - contract
    method: handler

  # userspace.oauth.api:discover_providers.endpoint
  - name: discover_providers.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that discovers available OAuth providers
      router: app:api
    method: GET
    func: discover_providers
    path: /userspace/oauth/providers/discover

  # userspace.oauth.api:get_connection_details
  - name: get_connection_details
    kind: function.lua
    meta:
      comment: Get OAuth connection details for management interface
    source: file://get_connection_details.lua
    modules:
      - http
      - json
      - contract
      - security
    imports:
      component: userspace.component:component
      oauth_repo: userspace.oauth.persist:oauth_repo
    method: handler

  # userspace.oauth.api:get_connection_details.endpoint
  - name: get_connection_details.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint to get OAuth connection details
      router: app:api
    method: GET
    func: get_connection_details
    path: /userspace/oauth/connections/{component_id}

  # userspace.oauth.api:get_provider_info
  - name: get_provider_info
    kind: function.lua
    meta:
      comment: Gets detailed information about a specific OAuth provider
    source: file://get_provider_info.lua
    modules:
      - http
      - json
      - contract
    method: handler

  # userspace.oauth.api:get_provider_info.endpoint
  - name: get_provider_info.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that gets OAuth provider information
      router: app:api
    method: GET
    func: get_provider_info
    path: /userspace/oauth/providers/{provider_name}

  # userspace.oauth.api:init_connection
  - name: init_connection
    kind: function.lua
    meta:
      comment: Initiates OAuth connection flow for a specific provider
    source: file://init_connection.lua
    modules:
      - http
      - json
      - contract
      - time
      - env
      - logger
    method: handler

  # userspace.oauth.api:init_connection.endpoint
  - name: init_connection.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that initiates OAuth connection flow
      router: app:api
    method: POST
    func: init_connection
    path: /userspace/oauth/providers/{provider_name}/init

  # userspace.oauth.api:update_connection
  - name: update_connection
    kind: function.lua
    meta:
      comment: Updates existing OAuth connection name and description
    source: file://update_connection.lua
    modules:
      - http
      - json
      - contract
    imports:
      component: userspace.component:component
      oauth_repo: userspace.oauth.persist:oauth_repo
    method: handler

  # userspace.oauth.api:update_connection.endpoint
  - name: update_connection.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that updates OAuth connection details
      router: app:api
    method: PUT
    func: update_connection
    path: /userspace/oauth/connections/{component_id}
