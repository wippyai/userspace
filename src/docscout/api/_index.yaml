version: "1.0"
namespace: userspace.docscout.api

entries:
  # userspace.docscout.api:create_group
  - name: create_group
    kind: function.lua
    meta:
      comment: Creates a new DocScout extraction group
    source: file://create_group.lua
    modules:
      - http
      - json
      - registry
    imports:
      governance_client: keeper.gov:client
    method: handler
    pool:
      size: 1

  # userspace.docscout.api:create_group.endpoint
  - name: create_group.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that creates a new DocScout extraction group
      router: app:api
    method: POST
    func: create_group
    path: /keeper/docscout/groups/create

  # userspace.docscout.api:delete_group
  - name: delete_group
    kind: function.lua
    meta:
      comment: Deletes a DocScout extraction group
    source: file://delete_group.lua
    modules:
      - http
      - json
      - registry
    imports:
      governance_client: keeper.gov:client
    method: handler
    pool:
      size: 1

  # userspace.docscout.api:delete_group.endpoint
  - name: delete_group.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that deletes a DocScout extraction group
      router: app:api
    method: DELETE
    func: delete_group
    path: /keeper/docscout/groups/delete

  # userspace.docscout.api:list_groups
  - name: list_groups
    kind: function.lua
    meta:
      comment: Lists all DocScout extraction groups with optional filtering
    source: file://list_groups.lua
    modules:
      - http
      - json
      - registry
    method: handler
    pool:
      size: 1

  # userspace.docscout.api:list_groups.endpoint
  - name: list_groups.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that lists all DocScout extraction groups
      router: app:api
    method: GET
    func: list_groups
    path: /keeper/docscout/groups/list

  # userspace.docscout.api:test_extraction
  - name: test_extraction
    kind: function.lua
    meta:
      comment: Tests a DocScout extraction on a file and returns the results
    source: file://test_extraction.lua
    modules:
      - http
      - json
    imports:
      extractor: userspace.docscout:extractor
    method: handler
    pool:
      size: 1

  # userspace.docscout.api:test_extraction.endpoint
  - name: test_extraction.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that runs a DocScout extraction test
      router: app:api
    method: POST
    func: test_extraction
    path: /keeper/docscout/test

  # userspace.docscout.api:update_group
  - name: update_group
    kind: function.lua
    meta:
      comment: Updates an existing DocScout extraction group
    source: file://update_group.lua
    modules:
      - http
      - json
      - registry
    imports:
      governance_client: keeper.gov:client
    method: handler
    pool:
      size: 1

  # userspace.docscout.api:update_group.endpoint
  - name: update_group.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that updates an existing DocScout extraction group
      router: app:api
    method: PUT
    func: update_group
    path: /keeper/docscout/groups/update
