version: "1.0"
namespace: userspace.kb9.api

entries:
  # userspace.kb9.api:api_error
  - name: api_error
    kind: library.lua
    meta:
      comment: Shared API error helper that logs raw errors server-side and returns sanitized client messages
    source: file://api_error.lua
    modules:
      - logger

  # userspace.kb9.api:browse
  - name: browse
    kind: function.lua
    meta:
      comment: Browse KB9 knowledge base tree structure with filtering and pagination
      tags:
        - kb9
        - api
        - browse
        - tree
    source: file://browse.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:browse.endpoint
  - name: browse.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for browsing KB9 tree structure
      tags:
        - kb9
        - api
        - endpoint
        - browse
      router: app:api
    method: GET
    func: browse
    path: /userspace/kb/kb9/{component_id}/browse

  # userspace.kb9.api:create_kb9
  - name: create_kb9
    kind: function.lua
    meta:
      comment: Creates a new KB9 knowledge base with selected implementations
      tags:
        - kb9
        - api
        - create
    source: file://create_kb9.lua
    modules:
      - http
      - json
      - uuid
      - contract
    imports:
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:create_kb9.endpoint
  - name: create_kb9.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for creating KB9 knowledge base
      tags:
        - kb9
        - api
        - endpoint
      router: app:api
    method: POST
    func: create_kb9
    path: /userspace/kb/kb9/create

  # userspace.kb9.api:delete_node
  - name: delete_node
    kind: function.lua
    meta:
      comment: Deletes a specific node from KB9 knowledge base
      tags:
        - kb9
        - api
        - delete
        - node
    source: file://delete_node.lua
    modules:
      - http
      - json
      - sql
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:delete_node.endpoint
  - name: delete_node.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for deleting KB9 nodes
      tags:
        - kb9
        - api
        - endpoint
        - delete
      router: app:api
    method: DELETE
    func: delete_node
    path: /userspace/kb/kb9/{component_id}/node/{node_id}

  # userspace.kb9.api:embed_content
  - name: embed_content
    kind: function.lua
    meta:
      comment: Embeds text content directly into KB9 knowledge base
      tags:
        - kb9
        - api
        - embed
    source: file://embed_content.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:embed_content.endpoint
  - name: embed_content.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for embedding content into KB9
      tags:
        - kb9
        - api
        - endpoint
      router: app:api
    method: POST
    func: embed_content
    path: /userspace/kb/kb9/{component_id}/embed_content

  # userspace.kb9.api:get_implementations
  - name: get_implementations
    kind: function.lua
    meta:
      comment: Returns available implementations for KB9 knowledge base creation
      tags:
        - kb9
        - api
        - implementations
    source: file://get_implementations.lua
    modules:
      - http
      - json
      - contract
      - registry
    method: handler

  # userspace.kb9.api:get_implementations.endpoint
  - name: get_implementations.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for getting KB9 implementations
      tags:
        - kb9
        - api
        - endpoint
      router: app:api
    method: GET
    func: get_implementations
    path: /userspace/kb/kb9/implementations

  # userspace.kb9.api:get_info
  - name: get_info
    kind: function.lua
    meta:
      comment: Gets KB9 knowledge base information and configuration
      tags:
        - kb9
        - api
        - info
    source: file://get_info.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:get_info.endpoint
  - name: get_info.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for getting KB9 info
      tags:
        - kb9
        - api
        - endpoint
      router: app:api
    method: GET
    func: get_info
    path: /userspace/kb/kb9/{component_id}/info

  # userspace.kb9.api:get_stats
  - name: get_stats
    kind: function.lua
    meta:
      comment: Gets KB9 knowledge base statistics and overview
      tags:
        - kb9
        - api
        - stats
        - analytics
    source: file://get_stats.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:get_stats.endpoint
  - name: get_stats.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for getting KB9 statistics
      tags:
        - kb9
        - api
        - endpoint
        - stats
      router: app:api
    method: GET
    func: get_stats
    path: /userspace/kb/kb9/{component_id}/stats

  # userspace.kb9.api:query
  - name: query
    kind: function.lua
    meta:
      comment: Queries KB9 knowledge base using configured query contract
      tags:
        - kb9
        - api
        - query
    source: file://query.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:query.endpoint
  - name: query.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for querying KB9
      tags:
        - kb9
        - api
        - endpoint
      router: app:api
    method: POST
    func: query
    path: /userspace/kb/kb9/{component_id}/query

  # userspace.kb9.api:update_config
  - name: update_config
    kind: function.lua
    meta:
      comment: Updates KB9 knowledge base configuration (embed/query contracts)
      tags:
        - kb9
        - api
        - config
    source: file://update_config.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:update_config.endpoint
  - name: update_config.endpoint
    kind: http.endpoint
    meta:
