        - kb9
        - api
        - endpoint
      router: app:api
    method: PUT
    func: update_config
    path: /userspace/kb/kb9/{component_id}/config

  # userspace.kb9.api:upload
  - name: upload
    kind: function.lua
    meta:
      comment: Registers uploaded file and starts async embedding into KB9 knowledge base
      tags:
        - kb9
        - api
        - upload
    source: file://upload.lua
    modules:
      - http
      - json
      - uuid
      - security
    imports:
      component: userspace.component:component
      userspace_consts: userspace.kb9:consts
      userspace_store: userspace.kb9.persist:store
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:upload.endpoint
  - name: upload.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for uploading files to KB9
      tags:
        - kb9
        - api
        - endpoint
      router: app:api
    method: POST
    func: upload
    path: /userspace/kb/kb9/{component_id}/upload

  # userspace.kb9.api:upload_status
  - name: upload_status
    kind: function.lua
    meta:
      comment: Gets status of a specific KB9 embed operation
    source: file://upload_status.lua
    modules:
      - http
    imports:
      component: userspace.component:component
      userspace_reader: userspace.kb9.persist:reader
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:upload_status.endpoint
  - name: upload_status.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for getting KB9 operation status
      router: app:api
    method: GET
    func: userspace.kb9.api:upload_status
    path: /userspace/kb/kb9/{component_id}/operations/{operation_id}

  # userspace.kb9.api:operations_list
  - name: operations_list
    kind: function.lua
    meta:
      comment: Lists KB9 embed operations for a component with filtering
    source: file://operations_list.lua
    modules:
      - http
    imports:
      component: userspace.component:component
      userspace_reader: userspace.kb9.persist:reader
      api_error: userspace.kb9.api:api_error
    method: handler

  # userspace.kb9.api:operations_list.endpoint
  - name: operations_list.endpoint
    kind: http.endpoint
    meta:
      comment: API endpoint for listing KB9 operations
      router: app:api
    method: GET
    func: userspace.kb9.api:operations_list
    path: /userspace/kb/kb9/{component_id}/operations
