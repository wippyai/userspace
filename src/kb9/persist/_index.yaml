      group: Components / KB9
      tags:
        - kb9
        - reader
        - vector
        - embeddings
        - search
        - tests
      description: Validates the functionality of KB9 reader vector search capabilities including similarity search, combined filtering, and graph traversal with embeddings
    source: file://reader_embeddings_test.lua
    modules:
      - sql
      - uuid
      - json
      - time
    imports:
      consts: userspace.kb9:consts
      ops: userspace.kb9.persist:ops
      reader: userspace.kb9.persist:reader
      test: wippy.test:test
