version: "1.0"
namespace: userspace.kb9.persist

entries:
  # userspace.kb9.persist:ops
  - name: ops
    kind: library.lua
    meta:
      comment: KB9 knowledge base operations handlers
      tags:
        - kb9
        - operations
        - knowledge-base
        - cqrs
      description: Provides operation handlers for KB9 knowledge base commands including component, node, and edge operations
      private: true
    source: file://ops.lua
    modules:
      - sql
      - time
      - uuid
      - json
    imports:
      consts: userspace.kb9:consts
    
  # userspace.kb9.persist:ops_test
  - name: ops_test
    kind: function.lua
    meta:
      name: KB9 Operations Tests
      type: test
      comment: Unit tests for the KB9 operations module
      group: Components / KB9
      tags:
        - kb9
        - operations
        - knowledge-base
        - tests
      description: Validates the functionality of KB9 operation handlers for components, nodes, and edges
    source: file://ops_test.lua
    modules:
      - sql
      - uuid
      - json
      - time
    imports:
      consts: userspace.kb9:consts
      ops: userspace.kb9.persist:ops
      test: wippy.test:test
    method: run_tests
    
  # userspace.kb9.persist:reader
