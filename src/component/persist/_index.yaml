version: "1.0"
namespace: userspace.component.persist

entries:
  # userspace.component.persist:consts
  - name: consts
    kind: library.lua
    meta:
      comment: Component-owned constants (db resource, table names, access masks, command types, lexorank alphabet)
      tags:
        - components
        - userspace
        - constants
      description: Single source for the persist/binding layer constants so nothing is hardcoded in function bodies
    source: file://consts.lua

  # userspace.component.persist:placement
  - name: placement
    kind: library.lua
    meta:
      comment: Hierarchy and ordering engine (lexorank positions + materialized/ltree paths)
      tags:
        - components
        - userspace
        - placement
        - hierarchy
      description: Backend-aware path materialization (postgres ltree, sqlite materialized TEXT) and lexorank fractional ordering for O(1) reorder
    source: file://placement.lua
    modules:
      - sql
    imports:
      consts: userspace.component.persist:consts

  # userspace.component.persist:access_subjects
  - name: access_subjects
    kind: library.lua
    meta:
      comment: Resolve a user into their access subjects (user + groups) for component access checks
      tags:
        - components
        - userspace
        - access
      description: Single, fail-closed place that expands a user into "user + their groups" so read and write access resolve identically and automatically
    source: file://access_subjects.lua
    modules:
      - security

  # userspace.component.persist:component_reader
  - name: component_reader
    kind: library.lua
    meta:
      comment: Flexible component query reader with immutable API
      tags:
        - components
        - userspace
        - query
        - reader
      description: Provides fluent, immutable API for reading components with filtering by user, metadata, and access permissions
    source: file://component_reader.lua
    modules:
      - sql
      - json
    imports:
      access_subjects: userspace.component.persist:access_subjects
      consts: userspace.component.persist:consts

  # userspace.component.persist:component_reader_test
  - name: component_reader_test
    kind: function.lua
    meta:
      name: Component Reader Test
      type: test
      comment: Tests the component reader functionality for querying components with filtering and access control
      group: Components
      tags:
        - components
        - database
        - query
        - tests
        - reader
      description: Comprehensive tests for the component reader library covering filtering, pagination, access control, and edge cases
    source: file://component_reader_test.lua
    modules:
      - sql
      - uuid
      - time
    imports:
      component_reader: userspace.component.persist:component_reader
      test: wippy.test:test
    method: run

  # userspace.component.persist:ops
  - name: ops
    kind: library.lua
    meta:
      comment: Component operation constants and command handlers
      tags:
        - components
        - userspace
        - operations
        - commands
        - access
      description: Defines constants for access control and command types, plus transaction-safe handlers for component operations
    source: file://ops.lua
    modules:
      - sql
      - time
      - uuid
      - json
    imports:
      access_subjects: userspace.component.persist:access_subjects
      placement: userspace.component.persist:placement
      consts: userspace.component.persist:consts
