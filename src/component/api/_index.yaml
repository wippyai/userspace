version: "1.0"
namespace: userspace.component.api

entries:
  # userspace.component.api:delete_component
  - name: delete_component
    kind: function.lua
    meta:
      comment: Deletes a user component
      depends_on:
        - app:api
    source: file://delete_component.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
    method: handler
    
  # userspace.component.api:delete_component.endpoint
  - name: delete_component.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that deletes a user component
      depends_on:
        - app:api
      router: app:api
    method: DELETE
    func: delete_component
    path: /userspace/components/{component_id}
    
  # userspace.component.api:discover_components
  - name: discover_components
    kind: function.lua
    meta:
      comment: Discovers available component types for creation
      depends_on:
        - app:api
    source: file://discover_components.lua
    modules:
      - http
      - json
      - contract
    method: handler
    
  # userspace.component.api:discover_components.endpoint
  - name: discover_components.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that discovers available component types
      depends_on:
        - app:api
      router: app:api
    method: GET
    func: discover_components
    path: /userspace/components/discover
    
  # userspace.component.api:list_components
  - name: list_components
    kind: function.lua
    meta:
      comment: Lists user components with filtering and pagination
      depends_on:
        - app:api
    source: file://list_components.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
    method: handler
    
  # userspace.component.api:list_components.endpoint
  - name: list_components.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that lists user components
      depends_on:
        - app:api
      router: app:api
    method: GET
    func: list_components
    path: /userspace/components/list
    
  # userspace.component.api:update_component
  - name: update_component
    kind: function.lua
    meta:
      comment: Updates component metadata (title, description, custom fields)
      depends_on:
        - app:api
    source: file://update_component.lua
    modules:
      - http
      - json
    imports:
      component: userspace.component:component
    method: handler
    
  # userspace.component.api:update_component.endpoint
  - name: update_component.endpoint
    kind: http.endpoint
    meta:
      comment: Endpoint that updates component metadata
      depends_on:
        - app:api
      router: app:api
    method: PUT
    func: update_component
    path: /userspace/components/{component_id}
    