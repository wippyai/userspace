version: "1.0"
namespace: app

# Standalone test harness for the component module. Wires the module's
# ns.requirements (router) and provides db / gateway / processes / bootloader so
# the module boots and runs its migrations in isolation. Excluded from publish
# (see wippy.yaml exclude: app:**).

entries:
  - name: db
    kind: db.sql.sqlite
    meta:
      comment: In-memory database for component tests
    file: ":memory:"

  - name: env_storage
    kind: env.storage.file
    meta:
      type: envstorage
    file_path: ./.wippy/test.env
    auto_create: true

  - name: processes
    kind: process.host
    lifecycle:
      auto_start: true

  - name: gateway
    kind: http.service
    meta:
      comment: Test HTTP server
    addr: :19087
    lifecycle:
      auto_start: true

  - name: api
    kind: http.router
    meta:
      comment: Test API router
      server: gateway
    prefix: /api

  - name: test_scope_policy
    kind: security.policy
    meta:
      comment: Permissive scope for component tests (grants db access to the test actor; component access itself stays grant-based)
    groups:
      - component_test
    policy:
      resources: '*'
      actions: '*'
      effect: allow

  - name: dep.userspace.component
    kind: ns.dependency
    meta:
      description: "Component module configuration for testing"
    component: "userspace/component"
    parameters:
      - name: router
        value: app:api

  - name: dep.wippy.bootloader
    kind: ns.dependency
    meta:
      description: "Bootloader configuration for testing"
    component: "wippy/bootloader"
    parameters:
      - name: application_host
        value: app:processes
      - name: env_storage
        value: app:env_storage
